server:
  host: 0.0.0.0
  port: 3000

database:
  driver: sqlite        # sqlite | mysql | postgres
  dsn: ./apirelay.db

log:
  level: info           # debug | info | warn | error
  path: ./logs          # 为空则只输出到 stdout
  format: console       # console | json

relay:
  max_retries: 3
  cooldown_seconds: 60
  request_timeout: 0    # 秒，0 表示不限（流式）
  default_group: default

auth:
  session_secret: ""    # 管理后台会话密钥（留空自动）
  initial_root_token: "" # 首次启动创建的 root 令牌，留空自动生成并打印
