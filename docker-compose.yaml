version: '3.8'

services:
  apirelay:
    build: .
    ports:
      - "15722:15722"
    volumes:
      - ./config.yml:/app/config.yml
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - APIRELAY_HOST=0.0.0.0
      - APIRELAY_PORT=15722
      - APIRELAY_ADMIN_KEY=${ADMIN_KEY:-change-me-in-production}
    restart: unless-stopped

