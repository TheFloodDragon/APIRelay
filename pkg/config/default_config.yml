server:
  host: 127.0.0.1
  port: 15722
  mode: release

  # 静态文件服务（前端）
  static_path: ./web/dist

database:
  type: sqlite
  path: ./data/apirelay.db

auth:
  # 管理后台访问密钥（请修改为强密码）
  admin_key: change-me-in-production

  # 是否需要登录
  require_login: false

  # JWT密钥（如果启用登录）
  jwt_secret: your-secret-key

# 默认调度策略
scheduler:
  strategy: priority  # priority, weighted, random, round_robin
  health_check_interval: 60
  unhealthy_threshold: 3

# 日志配置
logging:
  level: info
  format: json
  output: file
  file: ./logs/apirelay.log
  max_size: 100
  max_backups: 10
  max_age: 30
  request_log: true

# 监控
monitoring:
  prometheus:
    enabled: false
    path: /metrics

# CORS配置
cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - Accept
    - Authorization
    - Content-Type
    - Origin
    - X-Requested-With
    - X-Request-ID
    - X-Request-Id
    - Request-ID
    - X-API-Key
    - X-Api-Key
    - X-Goog-Api-Key
    - X-Goog-Api-Client
    - Anthropic-Version
    - Anthropic-Beta
    - OpenAI-Organization
    - OpenAI-Project
    - OpenAI-Beta
