name: Build Release Binaries

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci --prefer-offline --no-audit

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build ${{ matrix.name }}
    needs: frontend
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            runner: windows-2022
            goos: windows
            goarch: amd64
            output: apirelay-windows-amd64.exe
            needs_msys2: true

          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            output: apirelay-linux-amd64
            needs_linux_deps: true

          - name: darwin-amd64
            runner: macos-13
            goos: darwin
            goarch: amd64
            output: apirelay-darwin-amd64

          - name: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            output: apirelay-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21.x'
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Download frontend dist for embedding
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: internal/ui/assets

      - name: Install Linux build dependencies
        if: matrix.needs_linux_deps == true
        run: sudo apt-get update && sudo apt-get install -y gcc pkg-config

      - name: Set up MSYS2 for SQLite CGO
        if: matrix.needs_msys2 == true
        uses: msys2/setup-msys2@v2
        with:
          update: true
          cache: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Add MinGW to PATH
        if: matrix.needs_msys2 == true
        shell: pwsh
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Tidy Go modules
        run: go mod tidy

      - name: Download Go modules
        run: go mod download

      - name: Build binary
        shell: pwsh
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.output }}" ./cmd/server

      - name: Copy runtime files
        shell: pwsh
        run: Copy-Item config.yml.example dist/config.yml.example

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: apirelay-${{ matrix.name }}
          path: |
            dist/${{ matrix.output }}
            dist/config.yml.example
          if-no-files-found: error
