name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "26"

      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Download dependencies
        run: go mod download

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l common constant controller dto middleware model relay router main.go)"
          if [ -n "$unformatted" ]; then
            echo "以下文件未通过 gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: go build -o apirelay .

  cross-compile:
    name: Cross compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -ldflags "-s -w" -o "dist/apirelay-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: apirelay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
